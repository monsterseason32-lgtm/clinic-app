<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคลินิก - สำหรับเจ้าหน้าที่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; }
        .hidden { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- 1. หน้าเข้าสู่ระบบ (Simple PIN) -->
    <div id="loginView" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center border border-slate-200">
            <div class="bg-indigo-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-4xl">🔐</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">เจ้าหน้าที่คลินิก</h1>
            <p class="text-slate-500 mb-6 text-sm">กรุณาใส่รหัสผ่านเพื่อเข้าใช้งานระบบหลังบ้าน</p>
            
            <input type="password" id="pinInput" placeholder="รหัสผ่าน 4 หลัก" 
                   class="w-full p-4 text-center text-3xl tracking-[1rem] border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 mb-6 bg-slate-50 font-bold">
            
            <button onclick="checkPin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl text-xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
                เข้าสู่ระบบ
            </button>
        </div>
    </div>

    <!-- 2. หน้าแผงควบคุม (Doctor Dashboard) -->
    <div id="adminView" class="hidden animate-in fade-in duration-500">
        <nav class="bg-white shadow-sm p-4 sticky top-0 z-50 border-b border-slate-200">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="bg-indigo-600 text-white p-2 rounded-xl">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>
                    </div>
                    <span class="text-xl font-bold text-slate-800">ระบบจัดการนัดหมาย</span>
                </div>
                <button onclick="location.reload()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-100 transition-colors">
                    ออกจากระบบ
                </button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-4 md:p-8 grid md:grid-cols-12 gap-8">
            
            <!-- ฝั่งซ้าย: ค้นหาคนไข้ -->
            <section class="md:col-span-7 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-slate-800 flex items-center">
                            <span class="mr-2">👥</span> รายชื่อคนไข้ในระบบ
                        </h2>
                        <button onclick="loadPatients()" class="text-indigo-600 text-sm font-bold hover:underline">🔄 รีเฟรชข้อมูล</button>
                    </div>
                    
                    <div class="relative mb-6">
                        <input type="text" id="searchInput" onkeyup="filterPatients()" placeholder="ค้นหาด้วย ชื่อ, รหัส HN หรือเบอร์โทร..." 
                               class="w-full p-4 border-2 border-slate-50 rounded-2xl outline-none focus:border-indigo-500 pl-12 bg-slate-50">
                        <span class="absolute left-4 top-4 opacity-30 text-xl">🔍</span>
                    </div>
                    
                    <div id="patientList" class="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                        <div class="flex flex-col items-center py-20 text-slate-400">
                            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mb-4"></div>
                            <p>กำลังดึงข้อมูลจาก Google Sheets...</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ฝั่งขวา: ฟอร์มนัดหมาย -->
            <section id="apptSection" class="md:col-span-5 opacity-30 pointer-events-none transition-all duration-300">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 sticky top-24">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center">
                        <span class="mr-2">📅</span> บันทึกนัดหมายใหม่
                    </h2>
                    
                    <!-- บัตรข้อมูลคนไข้ที่เลือก -->
                    <div class="bg-gradient-to-br from-indigo-500 to-indigo-700 p-5 rounded-2xl mb-8 shadow-md text-white">
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <p class="text-indigo-100 text-xs uppercase tracking-wider mb-1">คนไข้ที่เลือก</p>
                                <p id="selectedName" class="text-xl font-bold">กรุณาเลือกคนไข้ด้านซ้าย</p>
                                <p id="selectedHN" class="text-sm opacity-80 font-mono mt-1">-</p>
                                <input type="hidden" id="selectedUid">
                            </div>
                            <div class="bg-white/20 p-3 rounded-full text-2xl">👤</div>
                        </div>
                        
                        <!-- ปุ่มทดสอบแจ้งเตือน -->
                        <button onclick="testNotification()" id="testBtn" 
                                class="w-full bg-white/20 hover:bg-white/30 border border-white/30 text-white text-sm py-2 rounded-xl transition-all flex items-center justify-center gap-2">
                            <span>🔔 ทดสอบส่งแจ้งเตือน</span>
                        </button>
                    </div>

                    <form id="apptForm" onsubmit="createAppointment(event)" class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-2 ml-1">เลือกวันที่นัด</label>
                            <input type="date" id="apptDate" required 
                                   class="w-full p-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 bg-slate-50">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-2 ml-1">เลือกช่วงเวลา</label>
                            <select id="apptTime" required class="w-full p-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 bg-slate-50">
                                <optgroup label="ช่วงเช้า">
                                    <option value="09:00 - 10:00">09:00 - 10:00</option>
                                    <option value="10:00 - 11:00">10:00 - 11:00</option>
                                    <option value="11:00 - 12:00">11:00 - 12:00</option>
                                </optgroup>
                                <optgroup label="ช่วงบ่าย">
                                    <option value="13:00 - 14:00">13:00 - 14:00</option>
                                    <option value="14:00 - 15:00">14:00 - 15:00</option>
                                    <option value="15:00 - 16:00">15:00 - 16:00</option>
                                </optgroup>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-2 ml-1">ชื่อแพทย์ผู้ตรวจ</label>
                            <input type="text" id="doctorName" placeholder="เช่น นพ.สมชาย" 
                                   class="w-full p-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 bg-slate-50">
                        </div>
                        <button type="submit" id="saveBtn" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl text-xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all mt-4">
                            ยืนยันการนัดหมาย
                        </button>
                    </form>
                </div>
            </section>

        </main>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwSA7bgT1h3H0qRQwBPFi53Eg2riLpMQ7-5NlWiwfvqFNkEVfutfaY8GQ5cSLGRHi-q/exec";
        const STAFF_PIN = "1234"; 

        let allPatients = [];

        function checkPin() {
            const input = document.getElementById('pinInput').value;
            if (input === STAFF_PIN) {
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('adminView').classList.remove('hidden');
                loadPatients();
            } else {
                Swal.fire('รหัสผ่านผิด!', 'กรุณาตรวจสอบรหัสผ่านอีกครั้ง', 'error');
                document.getElementById('pinInput').value = "";
            }
        }

        async function loadPatients() {
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "get_patients" })
                });
                const data = await res.json();
                if (data.success) {
                    allPatients = data.patients;
                    renderPatientList(allPatients);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('patientList').innerHTML = `<p class="text-center text-red-400 py-10">เกิดข้อผิดพลาด: ${err.message}</p>`;
            }
        }

        function renderPatientList(list) {
            const container = document.getElementById('patientList');
            if (list.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 py-10 bg-slate-50 rounded-2xl">ไม่พบรายชื่อคนไข้ในฐานข้อมูล</div>';
                return;
            }
            container.innerHTML = list.map(p => `
                <div onclick="selectPatient('${p.uid}', '${p.name}', '${p.hn}')" 
                     class="p-5 bg-white border border-slate-100 rounded-2xl shadow-sm hover:border-indigo-500 hover:bg-indigo-50 cursor-pointer transition-all flex justify-between items-center group mb-2">
                    <div>
                        <p class="font-bold text-slate-700 text-lg group-hover:text-indigo-700">${p.name}</p>
                        <div class="flex space-x-3 mt-1 text-sm text-slate-400">
                            <span class="font-mono bg-slate-100 px-2 rounded italic">${p.hn}</span>
                            <span>📞 ${p.phone}</span>
                        </div>
                    </div>
                    <div class="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-lg text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity">
                        เลือกนัดตรวจ
                    </div>
                </div>
            `).join('');
        }

        function filterPatients() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPatients.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.hn.toLowerCase().includes(term) ||
                p.phone.includes(term)
            );
            renderPatientList(filtered);
        }

        function selectPatient(uid, name, hn) {
            document.getElementById('selectedUid').value = uid;
            document.getElementById('selectedName').innerText = name;
            document.getElementById('selectedHN').innerText = `HN: ${hn}`;
            
            const section = document.getElementById('apptSection');
            section.classList.remove('opacity-30', 'pointer-events-none');
            
            section.classList.add('ring-4', 'ring-indigo-100');
            setTimeout(() => section.classList.remove('ring-4', 'ring-indigo-100'), 500);

            if(window.innerWidth < 768) {
                section.scrollIntoView({ behavior: 'smooth' });
            }
        }

        /**
         * 🌟 ฟังก์ชันใหม่: ทดสอบส่งแจ้งเตือน
         */
        async function testNotification() {
            const uid = document.getElementById('selectedUid').value;
            const name = document.getElementById('selectedName').innerText;
            const btn = document.getElementById('testBtn');
            
            if (!uid) return;

            btn.disabled = true;
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span>⏳ กำลังส่ง...</span>';

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: "test_notification", 
                        uid: uid,
                        name: name
                    })
                });
                const result = await res.json();
                
                if (result.success) {
                    Swal.fire({
                        title: 'ส่งสำเร็จ!',
                        text: 'ระบบได้ส่งข้อความทดสอบไปยังคนไข้เรียบร้อยแล้ว',
                        icon: 'success',
                        timer: 2000,
                        showConfirmButton: false
                    });
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                Swal.fire('เกิดข้อผิดพลาด', 'ตรวจสอบว่าคุณได้เพิ่ม action: "test_notification" ใน GAS หรือยัง?\n\n' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }

        async function createAppointment(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="flex items-center justify-center"><svg class="animate-spin h-5 w-5 mr-3 border-t-2 border-white rounded-full" viewBox="0 0 24 24"></svg> กำลังบันทึก...</span>';

            const payload = {
                action: "add_appointment",
                uid: document.getElementById('selectedUid').value,
                name: document.getElementById('selectedName').innerText,
                apptDate: document.getElementById('apptDate').value,
                apptTime: document.getElementById('apptTime').value,
                doctorName: document.getElementById('doctorName').value
            };

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                
                if (result.success) {
                    Swal.fire({
                        title: 'บันทึกนัดหมายสำเร็จ!',
                        text: 'ระบบได้ส่งข้อความแจ้งเตือนเข้า LINE ของคนไข้เรียบร้อยแล้ว',
                        icon: 'success',
                        confirmButtonColor: '#4f46e5'
                    }).then(() => {
                        document.getElementById('apptForm').reset();
                        document.getElementById('apptSection').classList.add('opacity-30', 'pointer-events-none');
                        document.getElementById('selectedName').innerText = "กรุณาเลือกคนไข้ด้านซ้าย";
                        document.getElementById('selectedHN').innerText = "-";
                    });
                }
            } catch (err) {
                Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        document.getElementById('pinInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPin();
        });
    </script>
</body>
</html>
