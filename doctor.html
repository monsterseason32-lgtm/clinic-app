<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคลินิก - สำหรับเจ้าหน้าที่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- 1. หน้าเข้าสู่ระบบ (Simple PIN) -->
    <div id="loginView" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
            <div class="bg-indigo-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-4xl">🔐</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">เจ้าหน้าที่คลินิก</h1>
            <p class="text-slate-500 mb-6 text-sm">กรุณาใส่รหัสผ่านเพื่อเข้าสู่ระบบ</p>
            <input type="password" id="pinInput" placeholder="รหัสผ่าน" class="w-full p-4 text-center text-2xl tracking-widest border-2 border-slate-200 rounded-2xl outline-none focus:border-indigo-500 mb-4">
            <button onclick="checkPin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl text-xl shadow-lg hover:bg-indigo-700 transition-all">เข้าสู่ระบบ</button>
        </div>
    </div>

    <!-- 2. หน้าแผงควบคุม (Doctor Dashboard) -->
    <div id="adminView" class="hidden">
        <!-- Navbar -->
        <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <span class="bg-indigo-600 text-white p-2 rounded-lg text-xl font-bold">🏥</span>
                    <span class="text-xl font-bold text-slate-800 hidden md:block">จัดการนัดหมายคลินิก</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-slate-500 text-sm hidden md:block">เจ้าหน้าที่: แอดมิน</span>
                    <button onclick="location.reload()" class="text-red-500 font-bold text-sm">ออกจากระบบ</button>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto p-4 md:p-8 grid md:grid-cols-2 gap-8">
            
            <!-- ฝั่งซ้าย: ค้นหาคนไข้ -->
            <section class="space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center">
                        <span class="mr-2">🔍</span> ค้นหาคนไข้
                    </h2>
                    <div class="relative">
                        <input type="text" id="searchInput" onkeyup="filterPatients()" placeholder="พิมพ์ชื่อ หรือ HN..." class="w-full p-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 pl-12">
                        <span class="absolute left-4 top-4 opacity-30 text-xl">🔎</span>
                    </div>
                    
                    <div id="patientList" class="mt-4 space-y-2 max-h-96 overflow-y-auto pr-2 custom-scrollbar">
                        <p class="text-center text-slate-400 py-10">กำลังโหลดรายชื่อคนไข้...</p>
                    </div>
                </div>
            </section>

            <!-- ฝั่งขวา: ฟอร์มนัดหมาย -->
            <section id="apptSection" class="opacity-30 pointer-events-none transition-opacity duration-300">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 sticky top-24">
                    <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center">
                        <span class="mr-2">📝</span> สร้างรายการนัดหมาย
                    </h2>
                    
                    <!-- ข้อมูลคนไข้ที่เลือก -->
                    <div class="bg-indigo-50 p-4 rounded-2xl mb-6 flex items-center border border-indigo-100">
                        <div class="bg-white w-12 h-12 rounded-full flex items-center justify-center text-2xl mr-4 shadow-sm">👤</div>
                        <div>
                            <p id="selectedName" class="font-bold text-indigo-900">ยังไม่ได้เลือกคนไข้</p>
                            <p id="selectedHN" class="text-sm text-indigo-600 font-mono">-</p>
                            <input type="hidden" id="selectedUid">
                        </div>
                    </div>

                    <form id="apptForm" onsubmit="createAppointment(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-1">วันที่นัดหมาย</label>
                            <input type="date" id="apptDate" required class="w-full p-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-1">ช่วงเวลา</label>
                            <select id="apptTime" required class="w-full p-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500">
                                <option value="09:00 - 10:00">09:00 - 10:00</option>
                                <option value="10:00 - 11:00">10:00 - 11:00</option>
                                <option value="11:00 - 12:00">11:00 - 12:00</option>
                                <option value="13:00 - 14:00">13:00 - 14:00</option>
                                <option value="14:00 - 15:00">14:00 - 15:00</option>
                                <option value="15:00 - 16:00">15:00 - 16:00</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-1">แพทย์ผู้ตรวจ</label>
                            <input type="text" id="doctorName" placeholder="ระบุชื่อแพทย์ (ถ้ามี)" class="w-full p-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500">
                        </div>
                        <button type="submit" id="saveBtn" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl text-xl shadow-lg hover:bg-indigo-700 transition-all active:scale-95">
                            บันทึกการนัดหมาย
                        </button>
                    </form>
                </div>
            </section>

        </main>
    </div>

    <script>
        // 🌟 ตั้งค่า URL ของ Google Script 🌟
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwSA7bgT1h3H0qRQwBPFi53Eg2riLpMQ7-5NlWiwfvqFNkEVfutfaY8GQ5cSLGRHi-q/exec";
        const STAFF_PIN = "1234"; // เปลี่ยนรหัสผ่านตรงนี้

        let allPatients = [];

        function checkPin() {
            const input = document.getElementById('pinInput').value;
            if (input === STAFF_PIN) {
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('adminView').classList.remove('hidden');
                loadPatients();
            } else {
                Swal.fire('รหัสไม่ถูกต้อง', 'กรุณาลองใหม่อีกครั้ง', 'error');
            }
        }

        async function loadPatients() {
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "get_patients" })
                });
                const data = await res.json();
                if (data.success) {
                    allPatients = data.patients;
                    renderPatientList(allPatients);
                }
            } catch (err) {
                setDebug("Error: " + err.message);
            }
        }

        function renderPatientList(list) {
            const container = document.getElementById('patientList');
            if (list.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 py-10">ไม่พบรายชื่อคนไข้</p>';
                return;
            }
            container.innerHTML = list.map(p => `
                <div onclick="selectPatient('${p.uid}', '${p.name}', '${p.hn}')" class="p-4 bg-white border border-slate-100 rounded-2xl shadow-sm hover:border-indigo-500 hover:bg-indigo-50 cursor-pointer transition-all flex justify-between items-center group">
                    <div>
                        <p class="font-bold text-slate-700 group-hover:text-indigo-700">${p.name}</p>
                        <p class="text-xs text-slate-400 font-mono">${p.hn} | ${p.phone}</p>
                    </div>
                    <span class="text-indigo-300 opacity-0 group-hover:opacity-100">➕ นัดตรวจ</span>
                </div>
            `).join('');
        }

        function filterPatients() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPatients.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.hn.toLowerCase().includes(term) ||
                p.phone.includes(term)
            );
            renderPatientList(filtered);
        }

        function selectPatient(uid, name, hn) {
            document.getElementById('selectedUid').value = uid;
            document.getElementById('selectedName').innerText = name;
            document.getElementById('selectedHN').innerText = `รหัส: ${hn}`;
            
            // เปิดให้กดฟอร์มฝั่งขวา
            const section = document.getElementById('apptSection');
            section.classList.remove('opacity-30', 'pointer-events-none');
            
            // เลื่อนจอไปที่ฟอร์ม (สำหรับมือถือ)
            if(window.innerWidth < 768) {
                section.scrollIntoView({ behavior: 'smooth' });
            }
        }

        async function createAppointment(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerHTML = 'กำลังบันทึก...';

            const payload = {
                action: "add_appointment",
                uid: document.getElementById('selectedUid').value,
                name: document.getElementById('selectedName').innerText,
                apptDate: document.getElementById('apptDate').value,
                apptTime: document.getElementById('apptTime').value,
                doctorName: document.getElementById('doctorName').value
            };

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                
                if (result.success) {
                    Swal.fire({
                        title: 'บันทึกสำเร็จ!',
                        text: 'รายการนัดหมายถูกบันทึกลงระบบ และส่งแจ้งเตือนเข้า LINE แล้ว',
                        icon: 'success',
                        confirmButtonColor: '#4f46e5'
                    }).then(() => {
                        document.getElementById('apptForm').reset();
                        document.getElementById('apptSection').classList.add('opacity-30', 'pointer-events-none');
                        document.getElementById('selectedName').innerText = "ยังไม่ได้เลือกคนไข้";
                        document.getElementById('selectedHN').innerText = "-";
                    });
                }
            } catch (err) {
                Swal.fire('Error', err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }
    </script>
</body>
</html>
