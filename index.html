<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ลงทะเบียนทำประวัติ - คลินิกชุมชนอุ่นใจ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'], },
                    colors: {
                        clinic: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', }
                    }
                }
            }
        }
    </script>
    <style>
        #mainApp { display: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased pb-10">

    <div id="loadingApp" class="min-h-screen flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-clinic-500 mb-4"></div>
        <h2 class="text-2xl font-bold text-slate-600">กำลังเตรียมระบบ...</h2>
    </div>

    <div id="mainApp" class="max-w-md mx-auto bg-slate-100 min-h-screen">
        <!-- Header -->
        <div class="bg-clinic-600 text-white p-6 rounded-b-3xl shadow-lg mb-6">
            <h1 class="text-3xl font-bold text-center mb-4">คลินิกชุมชนอุ่นใจ</h1>
            <p class="text-center text-clinic-100 mb-4">ระบบลงทะเบียนประวัติคนไข้ใหม่</p>
            <div class="flex items-center bg-white/20 p-4 rounded-2xl backdrop-blur-sm">
                <img id="profileImg" src="https://via.placeholder.com/150" alt="Profile" class="w-16 h-16 rounded-full border-2 border-white shadow-sm object-cover mr-4">
                <div>
                    <p class="text-lg opacity-90">เชื่อมต่อบัญชี LINE:</p>
                    <p id="lineName" class="text-2xl font-bold truncate">ผู้ใช้งาน</p>
                </div>
            </div>
        </div>

        <form id="clinicForm" class="px-4" onsubmit="submitForm(event)">
            <input type="hidden" id="uid" name="uid">

            <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 border border-slate-200">
                <div class="space-y-5">
                    <div>
                        <label class="block text-xl font-bold text-slate-700 mb-2">ชื่อ - นามสกุล</label>
                        <input type="text" id="name" required placeholder="เช่น สมชาย ใจดี" class="w-full p-4 text-xl border-2 border-slate-200 rounded-2xl focus:border-clinic-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xl font-bold text-slate-700 mb-2">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" required placeholder="08X-XXX-XXXX" class="w-full p-4 text-xl border-2 border-slate-200 rounded-2xl focus:border-clinic-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xl font-bold text-slate-700 mb-2">อายุ (ปี)</label>
                        <input type="number" id="age" required placeholder="เช่น 65" class="w-full p-4 text-xl border-2 border-slate-200 rounded-2xl focus:border-clinic-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xl font-bold text-slate-700 mb-2">โรคประจำตัว / แพ้ยา</label>
                        <textarea id="disease" rows="2" placeholder="เช่น เบาหวาน, ความดัน (ถ้าไม่มีให้เว้นว่าง)" class="w-full p-4 text-xl border-2 border-slate-200 rounded-2xl focus:border-clinic-500 outline-none resize-none"></textarea>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-clinic-600 hover:bg-clinic-700 text-white font-bold text-2xl py-5 rounded-3xl shadow-lg transition-all flex justify-center items-center">
                <span>บันทึกข้อมูลประวัติ</span>
            </button>
        </form>
    </div>

    <script>
        // 🌟 ใส่ข้อมูล LIFF ID และ Web App URL ของคุณ
        const LIFF_ID = "YOUR_LIFF_ID"; 
        const GAS_URL = "YOUR_GAS_URL";

        async function main() {
            if (LIFF_ID === "YOUR_LIFF_ID" || !LIFF_ID) {
                document.getElementById("loadingApp").style.display = "none";
                document.getElementById("mainApp").style.display = "block";
                return;
            }
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById("uid").value = profile.userId;
                    document.getElementById("lineName").textContent = profile.displayName;
                    if(profile.pictureUrl) document.getElementById("profileImg").src = profile.pictureUrl;
                    
                    document.getElementById("loadingApp").style.display = "none";
                    document.getElementById("mainApp").style.display = "block";
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF Init Error: ", err);
            }
        }
        main();

        async function submitForm(event) {
            event.preventDefault();
            const btn = document.getElementById("submitBtn");
            const originalBtnText = btn.innerHTML;
            
            btn.innerHTML = `<div class="animate-spin rounded-full h-8 w-8 border-t-4 border-white mr-3"></div> กำลังบันทึก...`;
            btn.disabled = true;

            const formData = {
                action: "register", // ส่งไปบอกหลังบ้านว่านี่คือการลงทะเบียนประวัติ
                uid: document.getElementById("uid").value || "mock-uid-123",
                name: document.getElementById("name").value,
                phone: document.getElementById("phone").value,
                age: document.getElementById("age").value,
                disease: document.getElementById("disease").value
            };

            try {
                // เพิ่ม headers เพื่อให้ส่งข้อมูลผ่านระบบ CORS ของ Google ได้อย่างปลอดภัย
                let response = await fetch(GAS_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(formData) 
                });
                let result = await response.json();

                if(result.success) {
                    Swal.fire({
                        title: 'ลงทะเบียนสำเร็จ!',
                        text: 'ระบบได้บันทึกประวัติของคุณเรียบร้อยแล้ว',
                        icon: 'success',
                        confirmButtonText: 'ปิดหน้าต่าง',
                        confirmButtonColor: '#0d9488'
                    }).then(() => {
                        if (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient()) {
                            liff.closeWindow();
                        } else {
                            btn.innerHTML = originalBtnText;
                            btn.disabled = false;
                            document.getElementById("clinicForm").reset();
                        }
                    });
                } else {
                    throw new Error(result.message); // โยน Error Message จากหลังบ้านออกมา
                }
            } catch (error) {
                // เปลี่ยนให้แสดงข้อความ Error จากระบบหลังบ้าน (แทนการแสดงคำว่า กรุณาลองใหม่อีกครั้ง)
                console.error("Error Details:", error);
                Swal.fire('เกิดข้อผิดพลาด', error.message || 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
