<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KidneyCare - แดชบอร์ดคนไข้</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; overflow-x: hidden; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-10">

    <!-- Loading State -->
    <div id="loader" class="min-h-screen flex flex-col items-center justify-center bg-white">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-teal-500 mb-4 border-t-transparent"></div>
        <p class="text-xl font-bold text-slate-500">กำลังเข้าสู่ระบบดูแลไต...</p>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="hidden max-w-md mx-auto">
        <div class="bg-teal-600 text-white p-6 rounded-b-[3rem] shadow-xl mb-6">
            <h1 class="text-2xl font-bold text-center mb-6">KidneyCare Dashboard</h1>
            <div class="flex items-center space-x-4">
                <img id="dashImg" src="" class="w-16 h-16 rounded-full border-2 border-white bg-teal-100 object-cover" 
                     onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzk0YTMiPjxwYXRoIGQ9Ik0xMiAxMmMyLjIxIDAgNC0xLjc5IDQtNHMtMS43OS00LTQtNC00IDEuNzktNCA0IDEuNzkgNCA0IDR6bTAgMmMtMi42NyAwLTggMS4zNC04IDR2MmgxNnYtMmMwLTIuNjYtNS4zMy00LTgtNHoiLz48L3N2Zz4=';">
                <div>
                    <p id="dashName" class="text-xl font-bold italic"></p>
                    <p id="dashHN" class="text-sm opacity-90 font-mono"></p>
                </div>
            </div>
        </div>

        <div class="px-5 space-y-6">
            <!-- 📊 Weight Trend Chart (ใหม่!) -->
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="text-lg font-bold text-teal-700 mb-4 flex items-center">
                    <span class="mr-2">📈</span> แนวโน้มน้ำหนักตัว
                </h3>
                <div class="h-48 w-full">
                    <canvas id="weightChart"></canvas>
                </div>
                <p class="text-xs text-slate-400 mt-2 text-center">* น้ำหนักที่เพิ่มเร็วอาจหมายถึงภาวะบวมน้ำ</p>
            </div>

            <!-- Health Profile -->
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="text-lg font-bold text-teal-700 mb-3">🩺 ข้อมูลสุขภาพ</h3>
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div class="bg-slate-50 p-3 rounded-2xl">
                        <p class="text-slate-400 text-xs uppercase">อายุ</p>
                        <p id="dashAge" class="text-lg font-bold"></p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl">
                        <p class="text-slate-400 text-xs uppercase">เบอร์โทร</p>
                        <p id="dashPhone" class="text-lg font-bold text-sm"></p>
                    </div>
                </div>
            </div>

            <!-- Appointments -->
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="text-lg font-bold text-teal-700 mb-4 flex items-center">
                    <span class="mr-2">📅</span> รายการนัดหมาย
                </h3>
                <div id="apptList" class="space-y-3">
                    <p class="text-slate-400 text-center py-4 italic text-sm">ไม่มีรายการนัดหมายใหม่</p>
                </div>
            </div>
            
            <button onclick="liff.closeWindow()" class="w-full bg-slate-200 text-slate-600 font-bold py-4 rounded-3xl mb-10">ออกจากแอป</button>
        </div>
    </div>

    <!-- Registration View -->
    <div id="registerView" class="hidden max-w-md mx-auto p-6">
        <div class="text-center mb-8 pt-10">
            <h1 class="text-3xl font-bold text-teal-600">ยินดีต้อนรับ</h1>
            <p class="text-slate-500">กรุณาลงทะเบียนเพื่อเริ่มใช้ระบบดูแลไต</p>
        </div>
        <form onsubmit="handleRegister(event)" class="space-y-5">
            <input type="hidden" id="uid">
            <input type="text" id="name" required placeholder="ชื่อ-นามสกุล" class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-teal-500">
            <div class="flex gap-4">
                <input type="tel" id="phone" required placeholder="เบอร์โทรศัพท์" class="flex-1 p-4 rounded-2xl border-2 border-slate-100 outline-none">
                <input type="number" id="age" required placeholder="อายุ" class="w-20 p-4 rounded-2xl border-2 border-slate-100 outline-none text-center">
            </div>
            <textarea id="disease" placeholder="โรคประจำตัว/แพ้ยา" class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none h-24"></textarea>
            <button type="submit" id="regBtn" class="w-full bg-teal-600 text-white font-bold py-5 rounded-2xl shadow-lg">ลงทะเบียน</button>
        </form>
    </div>

    <script>
        const LIFF_ID = "2009580376-INQkgBY4"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwSA7bgT1h3H0qRQwBPFi53Eg2riLpMQ7-5NlWiwfvqFNkEVfutfaY8GQ5cSLGRHi-q/exec";

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                document.getElementById('uid').value = profile.userId;

                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "check_user", uid: profile.userId })
                });
                const data = await res.json();
                document.getElementById('loader').classList.add('hidden');

                if (data.exists) {
                    showDashboard(data, profile.pictureUrl);
                } else {
                    document.getElementById('registerView').classList.remove('hidden');
                }
            } catch (err) {
                Swal.fire('Error', err.message, 'error');
            }
        }

        function showDashboard(data, pic) {
            document.getElementById('dashboardView').classList.remove('hidden');
            document.getElementById('dashName').innerText = data.patient.name;
            document.getElementById('dashHN').innerText = `HN: ${data.patient.hn}`;
            document.getElementById('dashAge').innerText = `${data.patient.age} ปี`;
            document.getElementById('dashPhone').innerText = data.patient.phone;
            if(pic) document.getElementById('dashImg').src = pic;

            // Render กราฟด้วย Chart.js
            const ctx = document.getElementById('weightChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.history.labels,
                    datasets: [{
                        label: 'น้ำหนัก (กก.)',
                        data: data.history.weights,
                        borderColor: '#14b8a6',
                        backgroundColor: 'rgba(20, 184, 166, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#14b8a6',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, grid: { display: false } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Render นัดหมาย
            const list = document.getElementById('apptList');
            if (data.appointments.length > 0) {
                list.innerHTML = data.appointments.map(a => `
                    <div class="p-4 bg-teal-50 rounded-2xl border-l-8 border-teal-500 flex justify-between items-center shadow-sm">
                        <div>
                            <p class="font-bold text-teal-900">${a.date}</p>
                            <p class="text-slate-600 text-sm">⏰ ${a.time}</p>
                        </div>
                        <span class="px-3 py-1 bg-white text-teal-600 rounded-full text-[10px] font-bold border border-teal-200 uppercase">${a.status}</span>
                    </div>
                `).join('');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";
            const payload = {
                action: "register", uid: document.getElementById('uid').value,
                name: document.getElementById('name').value, phone: document.getElementById('phone').value,
                age: document.getElementById('age').value, disease: document.getElementById('disease').value
            };
            const res = await fetch(GAS_URL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if(result.success) {
                Swal.fire('ลงทะเบียนสำเร็จ', 'เริ่มใช้งานระบบได้ทันที', 'success').then(() => location.reload());
            } else {
                Swal.fire('Error', result.message, 'error');
                btn.disabled = false; btn.innerText = "ลงทะเบียน";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
