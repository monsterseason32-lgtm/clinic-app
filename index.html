<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KidneyCare - คลินิกชุมชนอุ่นใจ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; overflow-x: hidden; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none; }
        input[type="text"], input[type="tel"], input[type="number"], textarea { font-size: 16px !important; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .bottom-sheet { transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bottom-sheet.show { transform: translateY(0); }
        .modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800 pb-10">

    <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gradient-to-b from-teal-50 to-white transition-opacity duration-500">
        <div class="relative flex justify-center items-center mb-6">
            <div class="absolute animate-ping inline-flex h-20 w-20 rounded-full bg-teal-400 opacity-20"></div>
            <div class="relative bg-teal-500 text-white p-4 rounded-full shadow-lg shadow-teal-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/></svg>
            </div>
        </div>
        <p id="loaderStatus" class="text-xl font-bold text-teal-800 tracking-wide">กำลังเตรียมความพร้อม...</p>
    </div>

    <div id="dashboardView" class="hidden max-w-md mx-auto relative min-h-screen animate-fade-in">
        <div class="bg-gradient-to-br from-teal-500 to-emerald-600 text-white pb-16 pt-8 px-6 rounded-b-[2.5rem] shadow-lg relative overflow-hidden">
            <div class="absolute top-0 right-0 -mr-10 -mt-10 w-40 h-40 rounded-full bg-white/10 blur-2xl"></div>
            <div class="flex items-center gap-5 relative z-10">
                <div class="relative shrink-0">
                    <img id="dashImg" src="" class="w-20 h-20 rounded-full border-[3px] border-white/70 shadow-md bg-teal-100 object-cover" onerror="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2394a3b8\'%3E%3Cpath d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\'/%3E%3C/svg%3E';">
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-teal-100 text-[10px] font-semibold tracking-wider uppercase mb-0.5">ยินดีต้อนรับ</p>
                    <p id="dashName" class="text-2xl font-bold truncate tracking-tight">...</p>
                    <span id="dashHN" class="mt-1.5 inline-block bg-white/20 px-2.5 py-1 rounded-lg text-xs font-mono shadow-sm">...</span>
                </div>
            </div>
        </div>

        <div class="px-5 space-y-5 -mt-10 relative z-20">
            <button onclick="openHealthModal()" class="w-full bg-white text-teal-600 border border-slate-100 font-bold py-4 rounded-[1.5rem] shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <div class="bg-teal-50 p-2 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></div>
                <span class="text-lg">บันทึกสุขภาพประจำวัน</span>
            </button>

            <div class="glass-card p-5 rounded-[2rem] shadow-sm border border-white/50">
                <h3 class="text-base font-bold text-slate-800 flex items-center gap-2 mb-4"><span class="bg-indigo-50 text-indigo-600 p-1.5 rounded-lg">📈</span> สถิติน้ำหนักล่าสุด</h3>
                <div class="h-[180px] w-full bg-slate-50/80 rounded-2xl p-2 border border-slate-100"><canvas id="patientWeightChart"></canvas></div>
            </div>
            
            <div class="glass-card p-5 rounded-[2rem] shadow-sm border border-white/50">
                <h3 class="text-base font-bold text-slate-800 flex items-center gap-2 mb-4"><span class="bg-teal-50 text-teal-600 p-1.5 rounded-lg">🩺</span> ประวัติส่วนตัว</h3>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="bg-slate-50/80 p-3.5 rounded-2xl border"><p class="text-slate-400 text-[10px] font-bold uppercase mb-1">อายุ (ปี)</p><p id="dashAge" class="text-lg font-bold text-slate-700">...</p></div>
                    <div class="bg-slate-50/80 p-3.5 rounded-2xl border"><p class="text-slate-400 text-[10px] font-bold uppercase mb-1">เบอร์โทรศัพท์</p><p id="dashPhone" class="text-sm font-bold text-slate-700 mt-1">...</p></div>
                </div>
                <div class="p-3.5 bg-rose-50/50 rounded-2xl border flex gap-3 items-start">
                    <div class="bg-rose-100 text-rose-500 p-1.5 rounded-lg mt-0.5"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></div>
                    <div><p class="text-rose-400 text-[10px] font-bold uppercase mb-0.5">โรคประจำตัว / แพ้ยา</p><p id="dashDisease" class="text-sm font-bold text-rose-700">...</p></div>
                </div>
            </div>

            <div class="glass-card p-5 rounded-[2rem] shadow-sm border border-white/50">
                <h3 class="text-base font-bold text-slate-800 flex items-center gap-2 mb-4"><span class="bg-blue-50 text-blue-600 p-1.5 rounded-lg">📅</span> คิวตรวจของคุณ</h3>
                <div id="apptList" class="space-y-3">
                    <div class="p-8 text-center bg-slate-50/80 rounded-2xl border border-dashed"><p class="text-slate-400 text-sm font-medium">ไม่มีรายการนัดหมาย</p></div>
                </div>
            </div>
            
            <button onclick="liff.closeWindow()" class="w-full bg-slate-200/50 text-slate-500 font-bold py-4 rounded-2xl hover:bg-slate-200 transition-colors mt-4">ออกจากแอปพลิเคชัน</button>
        </div>
    </div>

    <!-- หน้าลงทะเบียน -->
    <div id="registerView" class="hidden min-h-screen bg-white">
        <div class="bg-teal-600 text-white pt-12 pb-16 px-8 rounded-b-[3rem] text-center shadow-md relative">
            <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-sm text-3xl">📝</div>
            <h1 class="text-3xl font-bold">ทำประวัติคนไข้</h1>
            <p class="text-teal-100 mt-2 text-sm">กรุณาให้ข้อมูลเพื่อให้คุณหมอดูแลได้แม่นยำขึ้นค่ะ</p>
        </div>
        
        <form id="regForm" class="px-6 py-8 space-y-5 max-w-md mx-auto -mt-10 relative z-10 bg-white mx-4 rounded-3xl shadow-lg border" onsubmit="handleRegister(event)">
            <input type="hidden" id="uid">
            <div class="space-y-1"><label class="block text-[10px] font-bold text-slate-500 uppercase pl-1">ชื่อ - นามสกุล</label><input type="text" id="name" required class="w-full p-4 rounded-xl border bg-slate-50/50 outline-none focus:border-teal-500"></div>
            <div class="flex gap-4">
                <div class="flex-1 space-y-1"><label class="block text-[10px] font-bold text-slate-500 uppercase pl-1">เบอร์โทรศัพท์</label><input type="tel" id="phone" required class="w-full p-4 rounded-xl border bg-slate-50/50 outline-none focus:border-teal-500"></div>
                <div class="w-28 space-y-1"><label class="block text-[10px] font-bold text-slate-500 uppercase text-center">อายุ</label><input type="number" id="age" required class="w-full p-4 rounded-xl border bg-slate-50/50 text-center outline-none focus:border-teal-500"></div>
            </div>
            <div class="space-y-1"><label class="block text-[10px] font-bold text-slate-500 uppercase pl-1">โรคประจำตัว / แพ้ยา</label><textarea id="disease" rows="2" class="w-full p-4 rounded-xl border bg-slate-50/50 resize-none outline-none focus:border-teal-500"></textarea></div>
            <button type="submit" id="regBtn" class="w-full bg-teal-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg active:scale-95 transition-all mt-4">ส่งข้อมูลลงทะเบียน</button>
        </form>
    </div>

    <!-- หน้าต่างบันทึกสุขภาพ -->
    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 modal-overlay" onclick="closeHealthModal()"></div>
    <div id="healthModal" class="fixed bottom-0 left-0 right-0 z-50 bottom-sheet max-w-md mx-auto">
        <div class="bg-white rounded-t-[2.5rem] p-6 pb-10 shadow-2xl relative">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold flex items-center gap-2">📝 บันทึกสุขภาพวันนี้</h2>
                <button onclick="closeHealthModal()" class="text-slate-400 bg-slate-100 w-8 h-8 rounded-full flex items-center justify-center font-bold">&times;</button>
            </div>
            <form id="healthForm" onsubmit="submitDailyHealth(event)">
                <div class="space-y-4">
                    <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5 pl-1">น้ำหนักตัว (กิโลกรัม)</label><input type="number" step="0.1" id="dailyWeight" required class="w-full p-4 rounded-xl border bg-slate-50/50 text-lg text-center outline-none focus:border-teal-500"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5 pl-1 text-center">ความดันบน (SYS)</label><input type="number" id="dailySys" class="w-full p-4 rounded-xl border bg-slate-50/50 text-center font-bold outline-none focus:border-teal-500"></div>
                        <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1.5 pl-1 text-center">ความดันล่าง (DIA)</label><input type="number" id="dailyDia" class="w-full p-4 rounded-xl border bg-slate-50/50 text-center font-bold outline-none focus:border-teal-500"></div>
                    </div>
                </div>
                <button type="submit" id="btnSaveHealth" class="w-full bg-teal-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg active:scale-95 transition-transform mt-6">บันทึกและแจ้งคุณหมอ</button>
            </form>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009580376-INQkgBY4"; 
        // 🚨 นำลิงก์จาก Apps Script อันใหม่มาใส่ตรงนี้นะครับ
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwSA7bgT1h3H0qRQwBPFi53Eg2riLpMQ7-5NlWiwfvqFNkEVfutfaY8GQ5cSLGRHi-q/exec";

        async function initApp() {
            const timeout = setTimeout(() => {
                const status = document.getElementById('loaderStatus');
                if(status) { status.innerText = "การเชื่อมต่อล่าช้า..."; status.style.color = "#f97316"; }
            }, 10000);

            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                const profile = await liff.getProfile();
                document.getElementById('uid').value = profile.userId;

                const res = await fetch(GAS_URL, {
                    method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "check_user", uid: profile.userId, pictureUrl: profile.pictureUrl })
                });
                const data = await res.json();
                clearTimeout(timeout);
                
                if (data.success === false) throw new Error(data.message);
                
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    if (data.exists) showDashboard(data.patient, data.appointments, data.history, profile.pictureUrl);
                    else document.getElementById('registerView').classList.remove('hidden');
                }, 400);

            } catch (err) {
                clearTimeout(timeout);
                Swal.fire({ title: 'ข้อผิดพลาดการเชื่อมต่อ', text: err.message, icon: 'error' }).then(() => location.reload());
            }
        }

        function showDashboard(patient, appointments, history, pic) {
            document.getElementById('dashboardView').classList.remove('hidden');
            document.getElementById('dashName').innerText = patient.name;
            document.getElementById('dashHN').innerText = `HN: ${patient.hn}`;
            document.getElementById('dashAge').innerText = patient.age;
            document.getElementById('dashPhone').innerText = patient.phone;
            document.getElementById('dashDisease').innerText = patient.disease || "ไม่ระบุ";
            if(pic) document.getElementById('dashImg').src = pic;

            if (history && history.labels && history.labels.length > 0) {
                const ctx = document.getElementById('patientWeightChart').getContext('2d');
                Chart.defaults.font.family = "'Noto Sans Thai', sans-serif";
                new Chart(ctx, {
                    type: 'line',
                    data: { labels: history.labels, datasets: [{ label: 'น้ำหนัก (kg)', data: history.weights, borderColor: '#0d9488', backgroundColor: 'rgba(13, 148, 136, 0.1)', fill: true, tension: 0.4, borderWidth: 3 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { border: {display: false} }, x: { grid: {display: false}, border: {display: false} } } }
                });
            } else {
                document.getElementById('patientWeightChart').parentElement.innerHTML = '<div class="h-full flex justify-center items-center text-slate-400 text-xs">ยังไม่มีข้อมูลน้ำหนักตัว</div>';
            }

            const list = document.getElementById('apptList');
            if (appointments && appointments.length > 0) {
                list.innerHTML = appointments.map(a => `
                    <div class="bg-white border rounded-2xl p-4 shadow-sm relative overflow-hidden mb-3">
                        <div class="absolute left-0 top-0 bottom-0 w-1.5 ${a.status === 'รอยืนยัน' ? 'bg-amber-400' : 'bg-teal-500'}"></div>
                        <div class="pl-2 flex justify-between items-start">
                            <div><p class="font-bold text-base">${a.date}</p><p class="text-slate-500 text-xs mt-1">⏰ ${a.time} | 🩺 ${a.doctor || 'พยาบาล'}</p></div>
                            <span class="px-2 py-1 ${a.status === 'รอยืนยัน' ? 'bg-amber-50 text-amber-600 border-amber-100' : 'bg-teal-50 text-teal-600 border-teal-100'} rounded-lg text-[10px] font-bold border">${a.status}</span>
                        </div>
                        ${a.note ? `<div class="mt-3 ml-2 p-2 bg-slate-50 rounded-lg text-xs border"><b>ฝากจากคุณหมอ:</b> ${a.note}</div>` : ''}
                    </div>`).join('');
            }
        }

        function openHealthModal() { document.getElementById('modalOverlay').classList.add('show'); document.getElementById('healthModal').classList.add('show'); }
        function closeHealthModal() { document.getElementById('modalOverlay').classList.remove('show'); document.getElementById('healthModal').classList.remove('show'); document.getElementById('healthForm').reset(); }

        async function submitDailyHealth(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSaveHealth');
            btn.disabled = true; btn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mx-auto"></div>';
            try {
                const payload = { action: "add_daily_health", uid: document.getElementById('uid').value, weight: document.getElementById('dailyWeight').value, sys: document.getElementById('dailySys').value, dia: document.getElementById('dailyDia').value };
                const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.success) {
                    closeHealthModal();
                    Swal.fire({ title: 'บันทึกสำเร็จ!', text: 'ข้อมูลส่งให้ทีมพยาบาลแล้วค่ะ', icon: 'success' }).then(() => location.reload());
                } else throw new Error(result.message);
            } catch (error) { Swal.fire('เกิดข้อผิดพลาด', error.message, 'error'); btn.disabled = false; btn.innerText = "บันทึกและแจ้งคุณหมอ"; }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.disabled = true; btn.innerText = "กำลังดำเนินการ...";
            try {
                let picUrl = ""; let userLineId = document.getElementById('uid').value;
                if (liff.isLoggedIn()) { const profile = await liff.getProfile(); picUrl = profile.pictureUrl || ""; if (!userLineId) userLineId = profile.userId; }
                const res = await fetch(GAS_URL, {
                    method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "register", uid: userLineId, name: document.getElementById('name').value, phone: document.getElementById('phone').value, age: document.getElementById('age').value, disease: document.getElementById('disease').value, pictureUrl: picUrl })
                });
                const result = await res.json();
                if (result.success) Swal.fire({ title: 'สำเร็จ', text: 'เริ่มใช้งานแอปได้ทันทีค่ะ', icon: 'success' }).then(() => location.reload());
                else throw new Error(result.message);
            } catch (error) { Swal.fire('ข้อผิดพลาด', error.message, 'error'); btn.disabled = false; btn.innerText = "ส่งข้อมูลลงทะเบียน"; }
        }

        window.onload = initApp;
    </script>
</body>
</html>
