<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบนัดหมาย คลินิกชุมชน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'], },
                    colors: {
                        clinic: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', }
                    }
                }
            }
        }
    </script>
    <style>
        #mainApp { display: none; }
        input[type="date"], input[type="time"], select { min-height: 56px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased pb-10">

    <div id="loadingApp" class="min-h-screen flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-clinic-500 mb-4"></div>
        <h2 class="text-2xl font-bold text-slate-600">กำลังเตรียมระบบ...</h2>
    </div>

    <div id="mainApp" class="max-w-md mx-auto bg-slate-100 min-h-screen">
        <div class="bg-clinic-600 text-white p-6 rounded-b-3xl shadow-lg mb-6">
            <h1 class="text-3xl font-bold text-center mb-4">คลินิกชุมชนอุ่นใจ</h1>
            <div class="flex items-center bg-white/20 p-4 rounded-2xl backdrop-blur-sm">
                <img id="profileImg" src="https://via.placeholder.com/150" alt="Profile" class="w-16 h-16 rounded-full border-2 border-white shadow-sm object-cover mr-4">
                <div>
                    <p class="text-lg opacity-90">สวัสดีครับ/ค่ะ,</p>
                    <p id="lineName" class="text-2xl font-bold truncate">ผู้ใช้งาน</p>
                </div>
            </div>
        </div>

        <form id="clinicForm" class="px-4" onsubmit="submitForm(event)">
            <input type="hidden" id="uid" name="uid">

            <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 border border-slate-200">
                <h2 class="text-2xl font-bold text-clinic-700 mb-5 flex items-center">
                    <span class="bg-clinic-100 p-2 rounded-lg mr-3">👤</span> ข้อมูลส่วนตัว
                </h2>
                <div class="space-y-5">
                    <div>
                        <label class="block text-xl font-bold text-slate-700 mb-2">ชื่อ - นามสกุล</label>
                        <input type="text" id="name" required placeholder="เช่น สมชาย ใจดี" class="w-full p-4 text-xl border-2 border-slate-200 rounded-2xl focus:border-clinic-500 focus:ring-4 focus:ring-clinic-100 outline-none">
                    </div>
                    <div class="flex gap-4">
                        <div class="w-2/3">
                            <label class="block text-xl font-bold text-slate-700 mb-2">เบอร์โทรศัพท์</label>
                            <input type="tel" id="phone" required placeholder="08X-XXX-XXXX" class="w-full p-4 text-xl border-2 border-slate-200 rounded-2xl focus:border-clinic-500 focus:ring-4 focus:ring-clinic-100 outline-none">
                        </div>
                        <div class="w-1/3">
                            <label class="block text-xl font-bold text-slate-700 mb-2">อายุ (ปี)</label>
                            <input type="number" id="age" required placeholder="65" class="w-full p-4 text-xl border-2 border-slate-200 rounded-2xl focus:border-clinic-500 focus:ring-4 focus:ring-clinic-100 outline-none text-center">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xl font-bold text-slate-700 mb-2">โรคประจำตัว / แพ้ยา</label>
                        <input type="text" id="disease" placeholder="เช่น เบาหวาน, ความดัน (ถ้าไม่มีให้เว้นว่าง)" class="w-full p-4 text-xl border-2 border-slate-200 rounded-2xl focus:border-clinic-500 focus:ring-4 focus:ring-clinic-100 outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 border border-slate-200">
                <h2 class="text-2xl font-bold text-clinic-700 mb-5 flex items-center">
                    <span class="bg-clinic-100 p-2 rounded-lg mr-3">📅</span> จองคิวตรวจ
                </h2>
                <div class="space-y-5">
                    <div>
                        <label class="block text-xl font-bold text-slate-700 mb-2">วันที่ต้องการตรวจ</label>
                        <input type="date" id="apptDate" required class="w-full p-4 text-xl border-2 border-slate-200 rounded-2xl focus:border-clinic-500 focus:ring-4 focus:ring-clinic-100 outline-none bg-white">
                    </div>
                    <div>
                        <label class="block text-xl font-bold text-slate-700 mb-2">ช่วงเวลา</label>
                        <select id="apptTime" required class="w-full p-4 text-xl border-2 border-slate-200 rounded-2xl focus:border-clinic-500 focus:ring-4 focus:ring-clinic-100 outline-none bg-white">
                            <option value="" disabled selected>เลือกช่วงเวลา</option>
                            <option value="ช่วงเช้า (09:00 - 12:00)">ช่วงเช้า (09:00 - 12:00)</option>
                            <option value="ช่วงบ่าย (13:00 - 16:00)">ช่วงบ่าย (13:00 - 16:00)</option>
                            <option value="ช่วงเย็น (17:00 - 20:00)">ช่วงเย็น (17:00 - 20:00)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xl font-bold text-slate-700 mb-2">อาการเบื้องต้น</label>
                        <textarea id="symptoms" rows="3" required placeholder="เช่น ปวดหัว, มีไข้, มาตรวจตามนัด" class="w-full p-4 text-xl border-2 border-slate-200 rounded-2xl focus:border-clinic-500 focus:ring-4 focus:ring-clinic-100 outline-none resize-none"></textarea>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-clinic-600 hover:bg-clinic-700 text-white font-bold text-2xl py-5 rounded-3xl shadow-[0_10px_20px_rgba(20,184,166,0.3)] active:scale-95 transition-all flex justify-center items-center">
                <span>บันทึกการนัดหมาย</span>
            </button>
        </form>
    </div>

    <script>
        // ==========================================
        // 1. ใส่รหัส 2 ตัวที่เราได้มาตรงนี้ครับ
        // ==========================================
        const LIFF_ID = "2009580376-INQkgBY4"; // เช่น 1234567890-AbCdefgh
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwSA7bgT1h3H0qRQwBPFi53Eg2riLpMQ7-5NlWiwfvqFNkEVfutfaY8GQ5cSLGRHi-q/exec"; // เช่น https://script.google.com/macros/s/.../exec

        // ==========================================
        async function main() {
            if (LIFF_ID === "ใส่_LIFF_ID_ที่ได้จาก_LINE_Developers" || !LIFF_ID) {
                console.warn("รันในโหมดจำลอง (Mock Mode)");
                document.getElementById("loadingApp").style.display = "none";
                document.getElementById("mainApp").style.display = "block";
                return;
            }

            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById("uid").value = profile.userId;
                    document.getElementById("lineName").textContent = profile.displayName;
                    if(profile.pictureUrl) document.getElementById("profileImg").src = profile.pictureUrl;
                    
                    document.getElementById("loadingApp").style.display = "none";
                    document.getElementById("mainApp").style.display = "block";
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF Init Error: ", err);
                document.getElementById("loadingApp").style.display = "none";
                document.getElementById("mainApp").style.display = "block";
            }
        }

        main();

        async function submitForm(event) {
            event.preventDefault();
            const btn = document.getElementById("submitBtn");
            const originalBtnText = btn.innerHTML;
            
            btn.innerHTML = `<div class="animate-spin rounded-full h-8 w-8 border-t-4 border-b-4 border-white mr-3"></div> กำลังบันทึก...`;
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            const formData = {
                uid: document.getElementById("uid").value || "mock-uid-123",
                name: document.getElementById("name").value,
                phone: document.getElementById("phone").value,
                age: document.getElementById("age").value,
                disease: document.getElementById("disease").value,
                apptDate: document.getElementById("apptDate").value,
                apptTime: document.getElementById("apptTime").value,
                symptoms: document.getElementById("symptoms").value
            };

            try {
                // ส่งข้อมูลไปหา Google Sheets จริงๆ แล้ว!
                let response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });
                
                let result = await response.json();

                if(result.success) {
                    Swal.fire({
                        title: 'บันทึกสำเร็จ!',
                        text: 'ระบบได้ส่งข้อความยืนยันไปที่แชท LINE แล้ว',
                        icon: 'success',
                        confirmButtonText: 'ปิดหน้าต่าง',
                        confirmButtonColor: '#0d9488',
                        customClass: { title: 'text-2xl font-bold', popup: 'rounded-3xl', confirmButton: 'text-xl py-3 px-8 rounded-2xl' }
                    }).then(() => {
                        if (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient()) {
                            liff.closeWindow();
                        } else {
                            btn.innerHTML = originalBtnText;
                            btn.disabled = false;
                            btn.classList.remove('opacity-80', 'cursor-not-allowed');
                            document.getElementById("clinicForm").reset();
                        }
                    });
                } else {
                    throw new Error(result.message);
                }

            } catch (error) {
                console.error("Error:", error);
                Swal.fire({
                    title: 'เกิดข้อผิดพลาด',
                    text: 'กรุณาตรวจสอบการตั้งค่า GAS_URL อีกครั้ง',
                    icon: 'error',
                    confirmButtonColor: '#ef4444'
                });
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
